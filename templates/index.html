<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario AI Agent Dashboard</title>
    <!-- Use Tailwind CSS for rapid styling -> The user wants a beautiful UI per system instructions -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            font-family: 'Inter', sans-serif;
        }
        
        #log-container {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }

        #log-container::-webkit-scrollbar {
            width: 8px;
        }

        #log-container::-webkit-scrollbar-track {
            background: #1e293b;
        }

        #log-container::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 4px;
        }

        .log-info { color: #38bdf8; } /* Light Blue */
        .log-success { color: #4ade80; } /* Green */
        .log-error { color: #f87171; } /* Red */
        .log-action { color: #cbd5e1; } /* Light Gray */
        .log-highlight { color: #fbbf24; font-weight: bold; } /* Amber - for force jump */
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-lg">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400 mb-2">
                    Super Mario AI Dashboard
                </h1>
                <p class="text-slate-400">Live Reinforcement Learning (PPO) Evaluation</p>
            </div>
            
            <div class="mt-4 sm:mt-0 flex gap-4">
                <button id="startBtn" onclick="startGame()" class="px-8 py-3 bg-gradient-to-r from-emerald-500 to-teal-400 hover:from-emerald-400 hover:to-teal-300 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Play AI
                </button>
                <button id="stopBtn" onclick="stopGame()" disabled class="px-8 py-3 bg-slate-700 text-slate-400 cursor-not-allowed font-bold rounded-xl border border-slate-600 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                    Stop
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Game Stream -->
            <div class="lg:col-span-2 glass-panel p-2 flex flex-col justify-center items-center bg-black/50">
                <div class="w-full relative rounded-lg overflow-hidden border border-slate-700" style="aspect-ratio: 256/240;">
                    <!-- The MJPEG Feed from Flask -->
                    <img id="videoStream" src="{{ url_for('video_feed') }}" alt="Live Game Stream" class="w-full h-full object-contain bg-black">
                    
                    <!-- Overlay state -->
                    <div id="statusOverlay" class="absolute top-0 right-0 m-4 px-3 py-1 rounded-full bg-slate-800/80 border border-slate-600 flex items-center gap-2">
                        <span id="statusIndicator" class="w-3 h-3 rounded-full bg-slate-500"></span>
                        <span id="statusText" class="text-xs font-semibold uppercase tracking-wider text-slate-300">Idle</span>
                    </div>
                </div>
            </div>

            <!-- Evolutions & Actions Log -->
            <div class="glass-panel p-6 flex flex-col h-[600px] lg:h-auto">
                <div class="flex items-center justify-between mb-4 border-b border-slate-700 pb-4">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <svg class="w-6 h-6 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Actions & Evolution Logs
                    </h2>
                    <button onclick="clearLogs()" class="text-xs text-slate-400 hover:text-white px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 transition">Clear</button>
                </div>
                
                <div id="log-container" class="flex-1 bg-slate-900 rounded-lg p-4 overflow-y-auto text-sm border border-slate-800 shadow-inner">
                    <div class="log-info">System ready. Awaiting 'Play AI' command...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const logContainer = document.getElementById('log-container');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const videoStream = document.getElementById('videoStream');

        let logInterval = null;
        let isRunning = false;

        function updateUIState(running) {
            isRunning = running;
            if (running) {
                // UI changes for running state
                startBtn.disabled = true;
                startBtn.className = "px-8 py-3 bg-slate-700 text-slate-400 cursor-not-allowed font-bold rounded-xl flex items-center gap-2";
                
                stopBtn.disabled = false;
                stopBtn.className = "px-8 py-3 bg-red-500 hover:bg-red-400 text-white font-bold rounded-xl shadow-lg shadow-red-500/30 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center gap-2";
                
                statusIndicator.className = "w-3 h-3 rounded-full bg-emerald-500 animate-pulse";
                statusText.innerText = "Running";
                statusText.className = "text-xs font-semibold uppercase tracking-wider text-emerald-400";
                
                // Reload stream just in case
                videoStream.src = "{{ url_for('video_feed') }}?" + new Date().getTime(); 
            } else {
                // UI changes for stopped state
                startBtn.disabled = false;
                startBtn.className = "px-8 py-3 bg-gradient-to-r from-emerald-500 to-teal-400 hover:from-emerald-400 hover:to-teal-300 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center gap-2";
                
                stopBtn.disabled = true;
                stopBtn.className = "px-8 py-3 bg-slate-700 text-slate-400 cursor-not-allowed font-bold rounded-xl border border-slate-600 flex items-center gap-2";
                
                statusIndicator.className = "w-3 h-3 rounded-full bg-slate-500";
                statusText.innerText = "Idle";
                statusText.className = "text-xs font-semibold uppercase tracking-wider text-slate-300";
            }
        }

        async function startGame() {
            try {
                const res = await fetch('/start', { method: 'POST' });
                if (res.ok) {
                    clearLogs();
                    addLog("Starting server engine...", "info");
                    updateUIState(true);
                    startLogPolling();
                } else {
                    addLog("Failed to start game.", "error");
                }
            } catch (err) {
                addLog(`Error connecting: ${err}`, "error");
            }
        }

        async function stopGame() {
            try {
                const res = await fetch('/stop', { method: 'POST' });
                if (res.ok) {
                    addLog("Stopping engine...", "info");
                    updateUIState(false);
                    // Keep polling briefly to catch final logs
                    setTimeout(stopLogPolling, 2000); 
                }
            } catch (err) {
                addLog(`Error stopping: ${err}`, "error");
            }
        }

        function addLog(message, type) {
            const el = document.createElement('div');
            el.className = `py-1 border-b border-slate-800/50 log-${type}`;
            
            // Highlight Force Jumps if present
            if (message.includes("FORCE JUMP")) {
                 el.innerHTML = message.replace("FORCE JUMP!", "<span class='log-highlight'>FORCE JUMP!</span>");
            } else {
                 el.innerText = message;
            }
            
            logContainer.appendChild(el);
            
            // Auto scroll to bottom
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // Keep roughly only last 200 lines to prevent memory issues
            while (logContainer.children.length > 200) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        function clearLogs() {
            logContainer.innerHTML = '';
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/logs');
                const logs = await res.json();
                
                logs.forEach(log => {
                    addLog(log.msg, log.type);
                });
            } catch (e) {
                // Ignore silent fetch errors during reload
            }
        }

        // Periodically check if backend stopped autonomously (e.g. error)
        async function checkStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                if (isRunning !== data.running) {
                    updateUIState(data.running);
                    if (!data.running) stopLogPolling();
                    else startLogPolling();
                }
            } catch (e) {
                // server offline
                if (isRunning) {
                     updateUIState(false);
                     stopLogPolling();
                     addLog("Lost connection to server.", "error");
                }
            }
        }

        function startLogPolling() {
            if (!logInterval) {
                logInterval = setInterval(() => {
                    fetchLogs();
                    checkStatus();
                }, 500); // 2 times a second
            }
        }

        function stopLogPolling() {
            if (logInterval) {
                clearInterval(logInterval);
                logInterval = null;
            }
        }
        
        // Initial status check
        checkStatus();

    </script>
</body>
</html>
